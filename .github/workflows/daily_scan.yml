name: Daily SCTR Scan

on:
  schedule:
    - cron: '0 7 * * 2-6'   # 10:00 AM Israel time (IDT = UTC+3, summer). In winter (IST = UTC+2) this fires at 09:00 IL — adjust to '0 8 * * 2-6' then.
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright/python:v1.44.0-jammy

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install playwright==1.44.0 yfinance pandas supabase

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper/scrape_sctr.py
